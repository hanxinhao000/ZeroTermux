name: CI

on:
  push:
    branches: [main, master]
    tags:
      - 'ZeroTermux-*'
      - 'v*'
      - '[0-9]*'
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - '**/README.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, '[skip ci]') }}
    strategy:
      matrix:
        arch: [all, arm, arm64, x86, x86_64]
      fail-fast: false
    uses: ./.github/workflows/build.yml
    with:
      arch: ${{ matrix.arch }}
      build_debug: true
      build_release: true
    secrets:
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

  upload-to-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: 整理 APK 文件
        run: |
          mkdir -p ./apks
          find ./artifacts -name "*.apk" -type f -exec cp {} ./apks/ \;

          if [ -z "$(ls -A ./apks/)" ]; then
            echo "没有找到 APK 文件"
            exit 1
          fi

          echo "找到 $(ls ./apks/ | wc -l) 个 APK 文件"
          ls -lah ./apks/

      - name: 清空 Release 旧附件
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${GITHUB_REPOSITORY#*/}"
          TAG_NAME="${{ github.ref_name }}"

          RELEASE_ID=$(gh api "repos/$OWNER/$REPO/releases/tags/$TAG_NAME" --jq '.id' 2>/dev/null || true)
          if [[ -z "$RELEASE_ID" ]]; then
            echo "tag release 不存在，跳过清理"
            exit 0
          fi

          ASSET_IDS=$(gh api --paginate "repos/$OWNER/$REPO/releases/$RELEASE_ID/assets" --jq '.[].id')
          for ASSET_ID in $ASSET_IDS; do
            echo "删除 asset $ASSET_ID"
            gh api -X DELETE "repos/$OWNER/$REPO/releases/assets/$ASSET_ID"
          done

      - name: 上传 APK 到 Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ./apks/*.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
