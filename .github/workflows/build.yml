name: Build APK

on:
  workflow_dispatch:
    inputs:
      arch:
        description: '目标架构'
        required: true
        type: choice
        options:
          - all
          - universal
          - arm
          - arm64
          - x86
          - x86_64
      build_debug:
        description: '编译 Debug 版本'
        type: boolean
        default: true
      build_release:
        description: '编译 Release 版本'
        type: boolean
        default: true
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      build_debug:
        required: false
        type: boolean
        default: true
      build_release:
        required: false
        type: boolean
        default: true
    secrets:
      KEY_ALIAS:
        required: false
      KEY_PASSWORD:
        required: false
      STORE_PASSWORD:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      JAVA_VERSION: "17"
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: 配置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          add-job-summary: on-failure
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY || '' }}

      - name: 缓存 Bootstrap
        uses: actions/cache@v5
        with:
          path: app/src/main/cpp/bootstrap-*.zip
          key: bootstrap-${{ hashFiles('app/build.gradle') }}
          restore-keys: bootstrap-

      - name: 给 gradlew 执行权限
        run: chmod +x gradlew

      - name: 映射架构名称
        id: abi
        run: |
          case "${{ inputs.arch }}" in
            all)       echo "abi=all" >> $GITHUB_OUTPUT ;; 
            universal) echo "abi=universal" >> $GITHUB_OUTPUT ;;
            arm)       echo "abi=armeabi-v7a" >> $GITHUB_OUTPUT ;;
            arm64)     echo "abi=arm64-v8a" >> $GITHUB_OUTPUT ;;
            x86)       echo "abi=x86" >> $GITHUB_OUTPUT ;;
            x86_64)    echo "abi=x86_64" >> $GITHUB_OUTPUT ;;
          esac

      - name: 编译 APK (${{ inputs.arch }})
        run: |
          TASKS=""
          if [ "${{ inputs.build_debug }}" = "true" ]; then
            TASKS=":app:assembleDebug"
          fi
          if [ "${{ inputs.build_release }}" = "true" ]; then
            TASKS="$TASKS :app:assembleRelease"
          fi

          if [ -z "$(echo $TASKS)" ]; then
            echo "没有选择任何编译目标"
            exit 1
          fi

          ./gradlew --build-cache --parallel --stacktrace $TASKS -Darch=${{ inputs.arch }}

      - name: 上传 Debug APK (${{ steps.abi.outputs.abi }})
        if: ${{ inputs.build_debug && inputs.arch != 'all' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: ZeroTermux-Nightly_debug_${{ steps.abi.outputs.abi }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore

      - name: 上传 Release APK (${{ steps.abi.outputs.abi }})
        if: ${{ inputs.build_release && inputs.arch != 'all' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: ZeroTermux-Nightly_release_${{ steps.abi.outputs.abi }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore

      # all 模式下按架构分别上传，避免打包成一个 zip
      - name: 上传 Debug APK (universal)
        if: ${{ inputs.build_debug && inputs.arch == 'all' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: ZeroTermux-Nightly_debug_universal
          path: app/build/outputs/apk/debug/*_universal.apk
          if-no-files-found: ignore
      - name: 上传 Debug APK (armeabi-v7a)
        if: ${{ inputs.build_debug && inputs.arch == 'all' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: ZeroTermux-Nightly_debug_armeabi-v7a
          path: app/build/outputs/apk/debug/*_armeabi-v7a.apk
          if-no-files-found: ignore
      - name: 上传 Debug APK (arm64-v8a)
        if: ${{ inputs.build_debug && inputs.arch == 'all' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: ZeroTermux-Nightly_debug_arm64-v8a
          path: app/build/outputs/apk/debug/*_arm64-v8a.apk
          if-no-files-found: ignore
      - name: 上传 Debug APK (x86)
        if: ${{ inputs.build_debug && inputs.arch == 'all' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: ZeroTermux-Nightly_debug_x86
          path: app/build/outputs/apk/debug/*_x86.apk
          if-no-files-found: ignore
      - name: 上传 Debug APK (x86_64)
        if: ${{ inputs.build_debug && inputs.arch == 'all' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: ZeroTermux-Nightly_debug_x86_64
          path: app/build/outputs/apk/debug/*_x86_64.apk
          if-no-files-found: ignore

      - name: 上传 Release APK (universal)
        if: ${{ inputs.build_release && inputs.arch == 'all' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: ZeroTermux-Nightly_release_universal
          path: app/build/outputs/apk/release/*_universal.apk
          if-no-files-found: ignore
      - name: 上传 Release APK (armeabi-v7a)
        if: ${{ inputs.build_release && inputs.arch == 'all' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: ZeroTermux-Nightly_release_armeabi-v7a
          path: app/build/outputs/apk/release/*_armeabi-v7a.apk
          if-no-files-found: ignore
      - name: 上传 Release APK (arm64-v8a)
        if: ${{ inputs.build_release && inputs.arch == 'all' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: ZeroTermux-Nightly_release_arm64-v8a
          path: app/build/outputs/apk/release/*_arm64-v8a.apk
          if-no-files-found: ignore
      - name: 上传 Release APK (x86)
        if: ${{ inputs.build_release && inputs.arch == 'all' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: ZeroTermux-Nightly_release_x86
          path: app/build/outputs/apk/release/*_x86.apk
          if-no-files-found: ignore
      - name: 上传 Release APK (x86_64)
        if: ${{ inputs.build_release && inputs.arch == 'all' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: ZeroTermux-Nightly_release_x86_64
          path: app/build/outputs/apk/release/*_x86_64.apk
          if-no-files-found: ignore
